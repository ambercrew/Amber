name: brainy-learn
base: core22
title: Brainy
version: '1.0.0'
license: AGPL-3.0
summary: An open-source, AI-integrated learning app built around spaced repetition
description: |
  Brainy is an active learning app that combines notebook-style notes, flashcards, and the FSRS spaced repetition algorithm — so what you study actually sticks.

grade: stable
confinement: strict

layout:
  /usr/lib/$SNAPCRAFT_ARCH_TRIPLET/webkit2gtk-4.1:
    bind: $SNAP/usr/lib/$SNAPCRAFT_ARCH_TRIPLET/webkit2gtk-4.1

apps:
  brainy:
    command: usr/bin/brainy
    desktop: usr/share/applications/brainy.desktop
    extensions: [gnome]
    plugs:
      - network
      - home
      - removable-media
      - secret-service
      - single-instance-plug
    slots:
      - single-instance

slots:
  single-instance:
    interface: dbus
    bus: session
    name: org.app_brainylearn.SingleInstance

plugs:
  single-instance-plug:
    interface: dbus
    bus: session
    name: org.app_brainylearn.SingleInstance


parts:
  build-app:
    plugin: dump
    build-snaps:
      - node/20/stable
      - rustup/latest/stable
    build-packages:
      - libwebkit2gtk-4.1-dev
      - build-essential
      - curl
      - wget
      - file
      - libxdo-dev
      - libssl-dev
      - libayatana-appindicator3-dev
      - librsvg2-dev
      - dpkg
    stage-packages:
      - libwebkit2gtk-4.1-0
      - libayatana-appindicator3-1
    source: .
    override-build: |
      set -eu
      npm install
      npm run tauri build -- --bundles deb
      dpkg -x src-tauri/target/release/bundle/deb/*.deb $SNAPCRAFT_PART_INSTALL/
      sed -i -e "s|Icon=brainy|Icon=/usr/share/icons/hicolor/32x32/apps/brainy.png|g" $SNAPCRAFT_PART_INSTALL/usr/share/applications/brainy.desktop
