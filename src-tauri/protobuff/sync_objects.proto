syntax = "proto3";

import "google/protobuf/timestamp.proto";

package generated_code;

message FsrsProfile {
  google.protobuf.Timestamp modified_date = 1;
  string name = 2;
  double request_retention = 3;
  double maximum_interval = 4;
  repeated double weights = 5;
}

message DeletedEntity {
  string entity_name = 1;
  google.protobuf.Timestamp deleted_date = 2;
}
