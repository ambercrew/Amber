id: app.brainylearn.BrainyLearn

runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk

command: BrainyLearn
appstream-compose: false
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --share=ipc
  - --share=network
  - --env=WEBKIT_DISABLE_COMPOSITING_MODE=1
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node24
  - org.freedesktop.Sdk.Extension.rust-stable
build-options:
  append-path: /usr/lib/sdk/node22/bin:/usr/lib/sdk/rust-stable/bin

modules:
  - name: protobuf
    buildsystem: simple
    sources:
      - type: archive
        url: https://github.com/protocolbuffers/protobuf/releases/download/v29.6/protoc-29.6-linux-x86_64.zip
        sha256: 48785a926e73ffa3f68e2f22b14e7b849620c7a1d36809ac9249a5495e280323
        strip-components: 0
    build-commands:
      - install -Dm755 bin/protoc /app/bin/protoc
      - cp -r include /app/
    cleanup:
      - /bin/protoc
      - /include

  - name: brainy-learn
    buildsystem: simple

    build-options:
      env:
        HOME: /run/build/brainy-learn
        CARGO_HOME: /run/build/brainy-learn/cargo
        XDG_CACHE_HOME: /run/build/brainy-learn/flatpak-node/cache
        npm_config_offline: 'true'
        npm_config_cache: /run/build/brainy-learn/flatpak-node/npm-cache
        ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
        STORE_BUILD: '1'

    sources:
      - type: git
        url: https://github.com/brainylearn/brainy-app.git
        commit: 5c50bcc47c19b3f8d1a422bc672612337e6fc97b

        # These two files are generated by: (https://github.com/flatpak/flatpak-builder-tools/blob/master/node/README.md)
        # 1. nix-shell -p uv git --run "uvx --from 'flatpak-node-generator @ git+https://github.com/flatpak/flatpak-builder-tools.git#subdirectory=node' flatpak-node-generator npm package-lock.json -o node-sources.json"
        # 2. wget https://raw.githubusercontent.com/flatpak/flatpak-builder-tools/master/cargo/flatpak-cargo-generator.py
        # 3. nix-shell -p python3 python3Packages.aiohttp python3Packages.toml python3Packages.tomlkit --run "python3 flatpak-cargo-generator.py src-tauri/Cargo.lock -o cargo-sources.json"
      - cargo-sources.json
      - node-sources.json

    build-commands:
      - mkdir -p src-tauri/.cargo && echo -e '[source.crates-io]\nreplace-with = "vendored-sources"\n\n[source.vendored-sources]\ndirectory = "/run/build/brainy-learn/cargo/vendor"' > src-tauri/.cargo/config.toml
      - npm install --offline
      - npm run tauri build -- --bundles deb --config '{"identifier":"app.brainylearn.BrainyLearn","bundle":{"createUpdaterArtifacts":false}}' -- --features store
      - cd src-tauri/target/release/bundle/deb/ && ar x *.deb && tar xf data.tar.gz
      - install -Dm755 src-tauri/target/release/bundle/deb/usr/bin/BrainyLearn /app/bin/BrainyLearn
      - install -Dm644 "src-tauri/target/release/bundle/deb/usr/share/applications/Brainy Learn.desktop" /app/share/applications/app.brainylearn.BrainyLearn.desktop
      - desktop-file-edit --set-icon=app.brainylearn.BrainyLearn /app/share/applications/app.brainylearn.BrainyLearn.desktop
      - install -Dm644 src-tauri/target/release/bundle/deb/usr/share/icons/hicolor/32x32/apps/BrainyLearn.png /app/share/icons/hicolor/32x32/apps/app.brainylearn.BrainyLearn.png
      - install -Dm644 src-tauri/target/release/bundle/deb/usr/share/icons/hicolor/128x128/apps/BrainyLearn.png /app/share/icons/hicolor/128x128/apps/app.brainylearn.BrainyLearn.png
      - install -Dm644 app.brainylearn.BrainyLearn.metainfo.xml /app/share/metainfo/app.brainylearn.BrainyLearn.metainfo.xml
