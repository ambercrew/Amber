id: app.brainylearn.brainy_learn

runtime: org.gnome.Platform
runtime-version: '47'
sdk: org.gnome.Sdk

command: BrainyLearn
appstream-compose: false
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --share=ipc
  - --share=network
  - --env=WEBKIT_DISABLE_COMPOSITING_MODE=1
  - --env=STORE_BUILD=1

modules:
  - name: brainy-learn
    buildsystem: simple

    sources:
      - type: file
        url: https://github.com/brainylearn/brainy-app/releases/download/v1.4.0/Brainy.Learn_1.4.0_amd64.deb
        sha256: b0d149c062ebc5d93b28372f8ec6b7c23f0134e98b485155f51b47206c7792e7
        dest-filename: brainy-learn.deb
        x-checker-data:
          type: json
          url: https://api.github.com/repos/brainylearn/brainy-app/releases/latest
          version-query: .tag_name | ltrimstr("v")
          url-query: .assets[] | select(.name | test("_amd64\\.deb$")) | .browser_download_url
      - type: file
        path: flatpak.metainfo.xml
    build-commands:
      - ar x brainy-learn.deb && tar xf data.tar.gz
      - install -Dm755 usr/bin/BrainyLearn /app/bin/BrainyLearn
      - install -Dm644 "usr/share/applications/Brainy Learn.desktop" /app/share/applications/app.brainylearn.brainy_learn.desktop
      - install -Dm644 usr/share/icons/hicolor/32x32/apps/BrainyLearn.png /app/share/icons/hicolor/32x32/apps/BrainyLearn.png
      - install -Dm644 usr/share/icons/hicolor/128x128/apps/BrainyLearn.png /app/share/icons/hicolor/128x128/apps/BrainyLearn.png
      - install -Dm644 flatpak.metainfo.xml /app/share/metainfo/app.brainylearn.brainy_learn.metainfo.xml
